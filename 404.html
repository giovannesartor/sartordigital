<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada - Sartor Digital</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="https://i.postimg.cc/25tgbP7P/LOGO-ICO.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #86EFAC; --mint-mid: #4ADE80; --mint-dark: #16A34A;
            --bg: #0F172A; --text: #F1F5F9; --text-muted: #94A3B8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 24px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(rgba(134,239,172,0.06) 1px, transparent 1px);
            background-size: 24px 24px; pointer-events: none;
        }
        .container { position: relative; z-index: 1; max-width: 540px; }
        .error-code {
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 900; letter-spacing: -0.06em; line-height: 1;
            background: linear-gradient(135deg, var(--mint-dark), var(--mint), var(--mint-mid));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 16px;
        }
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5rem;
            font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em;
        }
        p { color: var(--text-muted); font-size: 1rem; line-height: 1.65; margin-bottom: 32px; }
        .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 12px; font-weight: 600;
            font-size: 0.9375rem; text-decoration: none; border: none;
            cursor: pointer; transition: all 200ms ease; white-space: nowrap;
        }
        .btn-mint { background: var(--mint); color: #0F172A; }
        .btn-mint:hover { background: var(--mint-mid); transform: translateY(-1px); }
        .btn-ghost {
            background: transparent; color: var(--mint);
            border: 1px solid rgba(134,239,172,0.3); font-size: 0.875rem;
        }
        .btn-ghost:hover { background: rgba(134,239,172,0.1); }
        .logo {
            display: flex; align-items: center; gap: 10px; justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800;
            font-size: 1rem; color: #fff; margin-bottom: 48px; text-decoration: none;
        }
        .logo img { width: 32px; height: 32px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo">
            <img src="https://i.postimg.cc/25tgbP7P/LOGO-ICO.png" alt="Sartor Digital">
            Sartor Digital
        </a>
        <div class="error-code">404</div>
        <h1>Página não encontrada</h1>
        <p>A página que você está procurando não existe ou foi movida. Volte para a página inicial ou entre em contato conosco.</p>
        <div class="btns">
            <a href="/" class="btn btn-mint"><i class="fas fa-home"></i> Voltar ao Início</a>
            <a href="https://wa.me/5554993031264" target="_blank" class="btn btn-ghost"><i class="fab fa-whatsapp"></i> Falar Conosco</a>
        </div>
    </div>
</body>
</html>
