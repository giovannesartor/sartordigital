<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Projeto Leve 30D — App</title>
<meta name="theme-color" content="#0f3d2e">
<meta name="description" content="App do Projeto Leve 30D: cardápio, receitas, treinos e progresso.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leve 30D">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --g900:#0f3d2e;--g800:#16513c;--g700:#1f6b4f;--g600:#2e8b62;--g500:#3ca579;--g400:#4cb888;--g300:#7fc8a6;
  --g100:#e3f3ea;--g50:#f1f9f4;--gold:#c2a15e;--gold2:#d8bd82;--warm:#e08a3c;
  --ink:#15241d;--muted:#5f6f67;--line:#e5ece8;--card:#ffffff;--card2:#fbfdfc;
  --bg1:#eef5f0;--bg2:#e5f0e9;--glowA:rgba(127,200,166,.5);--glowB:rgba(194,161,94,.22);
  --shadow:0 10px 30px rgba(15,61,46,.10);--shadow-sm:0 4px 14px rgba(15,61,46,.07);--shadow-lg:0 22px 50px rgba(15,61,46,.18);
  --head:'Poppins',sans-serif;--body:'Inter',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
[data-theme="dark"]{
  --ink:#e9f3ee;--muted:#93a89e;--line:rgba(255,255,255,.09);--card:#12251d;--card2:#0f2018;
  --bg1:#08140f;--bg2:#0b1c15;--glowA:rgba(46,139,98,.30);--glowB:rgba(194,161,94,.14);--g50:#12251d;--g100:#173026;
  --shadow:0 12px 34px rgba(0,0,0,.45);--shadow-sm:0 4px 16px rgba(0,0,0,.4);--shadow-lg:0 22px 54px rgba(0,0,0,.6);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);color:var(--ink);background:var(--bg1);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;position:relative;transition:background .3s,color .3s}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:
  radial-gradient(900px 520px at 88% -8%,var(--glowA),transparent 60%),
  radial-gradient(760px 460px at -10% 12%,var(--glowB),transparent 60%),
  radial-gradient(700px 500px at 50% 118%,var(--glowA),transparent 62%),
  linear-gradient(180deg,var(--bg1),var(--bg2));}
body::after{content:"";position:fixed;inset:0;z-index:-1;opacity:.5;pointer-events:none;
  background-image:radial-gradient(rgba(15,61,46,.05) 1px,transparent 1px);background-size:22px 22px}
[data-theme="dark"] body::after{background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px)}
h1,h2,h3,h4,.f-head{font-family:var(--head)}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.ic{display:inline-block;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;width:24px;height:24px;flex:none}
.hide{display:none!important}

/* ===== GATE ===== */
#gate{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#0f3d2e,#16513c 45%,#1f6b4f);
  color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 26px;text-align:center;overflow:hidden}
#gate::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;top:-180px;right:-160px;
  background:radial-gradient(circle at 30% 30%,rgba(127,200,166,.35),transparent 70%)}
#gate::after{content:"";position:absolute;width:380px;height:380px;border-radius:50%;bottom:-130px;left:-120px;border:1px solid rgba(255,255,255,.12)}
#gate>*{position:relative;z-index:2}
#gate .logo{width:92px;height:92px;margin-bottom:20px;border-radius:26px;box-shadow:0 14px 34px rgba(0,0,0,.35)}
#gate h1{font-size:1.75rem;font-weight:800;letter-spacing:-.5px}
#gate h1 .hl{color:#7fc8a6}
#gate p{color:#cfe7da;margin:8px 0 26px;max-width:320px;font-size:.98rem;line-height:1.5}
#gate .field{width:100%;max-width:330px}
#gate input{width:100%;text-align:center;font-family:var(--head);font-weight:700;font-size:1.2rem;letter-spacing:.12em;
  padding:16px;border-radius:15px;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;outline:none}
#gate input::placeholder{color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:none;font-weight:600}
#gate input:focus{border-color:#7fc8a6;background:rgba(255,255,255,.16)}
#gate .err{color:#ffd7cf;font-size:.86rem;margin-top:10px;min-height:18px;font-weight:600}
#gate .unlock{width:100%;max-width:330px;margin-top:14px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#2a2410;
  font-family:var(--head);font-weight:700;font-size:1.05rem;padding:16px;border-radius:15px;box-shadow:0 14px 30px rgba(184,151,90,.4)}
#gate .help{margin-top:22px;font-size:.8rem;color:#a9cdbb;max-width:330px;line-height:1.5}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

/* ===== SHELL ===== */
#app{display:none;min-height:100%;padding-bottom:calc(104px + var(--safe-b))}
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(15,61,46,.99),rgba(15,61,46,.94));
  color:#fff;padding:calc(12px + var(--safe-t)) 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 6px 20px rgba(15,61,46,.18)}
.topbar .tb-title{font-family:var(--head);font-weight:700;font-size:1.05rem;display:flex;align-items:center;gap:9px}
.topbar .tb-title img{width:28px;height:28px;border-radius:8px}
.topbar .tb-title .hl{color:#7fc8a6}
.tb-actions{display:flex;gap:8px}
.tb-btn{color:#dff0e6;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1)}
.tb-btn:active{transform:scale(.92)}

.view{padding:18px 16px 20px;max-width:680px;margin:0 auto;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.vtitle{font-family:var(--head);font-weight:800;font-size:1.5rem;color:var(--ink);margin-bottom:3px;letter-spacing:-.5px}
.vsub{color:var(--muted);font-size:.92rem;margin-bottom:16px}
.section-h{font-family:var(--head);font-weight:700;color:var(--ink);font-size:1.05rem;margin:22px 0 11px;display:flex;align-items:center;gap:8px}
.section-h .ic{width:19px;height:19px;color:var(--g600)}

.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow-sm)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;text-align:left;display:flex;flex-direction:column;gap:9px;box-shadow:var(--shadow-sm);transition:.15s;position:relative;overflow:hidden}
.tile:active{transform:scale(.97)}
.tile .ic-w{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--g600),var(--g500));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(46,139,98,.3)}
.tile h4{font-family:var(--head);font-weight:700;font-size:1rem;color:var(--ink)}
.tile p{font-size:.78rem;color:var(--muted)}
.tile.gold .ic-w{background:linear-gradient(135deg,var(--gold2),var(--gold))}

/* HERO */
.hero{background:linear-gradient(135deg,#134634,#1f6b4f 70%,#2e8b62);color:#fff;border-radius:22px;padding:20px;
  display:flex;align-items:center;gap:16px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;width:220px;height:220px;border-radius:50%;top:-90px;right:-70px;
  background:radial-gradient(circle at 35% 35%,rgba(127,200,166,.45),transparent 70%)}
.ring{width:88px;height:88px;flex:none;position:relative;z-index:2}
.hero .h-t{font-family:var(--head);font-weight:700;font-size:1.15rem;position:relative;z-index:2}
.hero .h-s{color:#dff0e6;font-size:.85rem;margin-top:3px;position:relative;z-index:2}

/* streak strip */
.streak{display:flex;gap:10px;margin-bottom:14px}
.streak .s-item{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center;box-shadow:var(--shadow-sm)}
.streak .s-item .sn{font-family:var(--head);font-weight:800;font-size:1.5rem;line-height:1;display:flex;align-items:center;justify-content:center;gap:5px}
.streak .s-item.fire .sn{color:var(--warm)}
.streak .s-item.gold .sn{color:var(--gold)}
.streak .s-item.green .sn{color:var(--g600)}
.streak .s-item .sl{font-size:.7rem;color:var(--muted);margin-top:3px}
.streak .s-item .ic{width:18px;height:18px}

/* today card */
.today{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px;position:relative;overflow:hidden}
.today .tday-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.today .tday-h b{font-family:var(--head);font-weight:800;font-size:1.1rem;color:var(--ink)}
.today .tday-h .pill{font-family:var(--head);font-weight:700;font-size:.72rem;color:#fff;background:var(--g600);padding:4px 11px;border-radius:20px}
.today .tmeal{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:.88rem}
.today .tmeal:last-of-type{border:none}
.today .tmeal .mw{flex:0 0 84px;font-family:var(--head);font-weight:600;color:var(--g600);font-size:.74rem}
.today .tmeal .mt{flex:1;color:var(--ink)}
.today .tbtn{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--g600),var(--g500));color:#fff;font-family:var(--head);font-weight:700;padding:14px;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px rgba(46,139,98,.32)}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
.abtn{display:flex;align-items:center;justify-content:center;gap:9px;font-family:var(--head);font-weight:700;font-size:.95rem;padding:15px;border-radius:14px;text-align:center;line-height:1.2}
.abtn.pdf{background:linear-gradient(135deg,var(--g600),var(--g500));color:#fff;box-shadow:0 8px 20px rgba(46,139,98,.32)}
.abtn.install{background:var(--card);color:var(--g700);border:1.5px solid var(--g300)}
[data-theme="dark"] .abtn.install{color:var(--g300)}

/* depoimento */
.depo{background:linear-gradient(135deg,var(--gold),#a9863f);color:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.depo b{font-family:var(--head);font-weight:800;font-size:1.1rem;display:block;margin-bottom:5px}
.depo p{font-size:.88rem;color:#fff5e6;margin-bottom:12px}
.depo a{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#8a6a1e;font-family:var(--head);font-weight:700;padding:11px 18px;border-radius:12px;font-size:.9rem}
.depo .dismiss{color:#fff5e6;font-size:.8rem;margin-left:14px;text-decoration:underline}

/* list items */
.day-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm);transition:.15s}
.day-item:active{transform:scale(.98)}
.day-item .dn{width:44px;height:44px;border-radius:13px;background:var(--g50);color:var(--g700);font-family:var(--head);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex:none;border:1px solid var(--line)}
.day-item.done .dn{background:linear-gradient(135deg,var(--g600),var(--g500));color:#fff;border:none}
.day-item .di{flex:1;min-width:0}
.day-item .di b{font-family:var(--head);color:var(--ink);font-size:.98rem}
.day-item .di span{display:block;color:var(--muted);font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-item .chev{color:var(--g300)}
.kbadge{font-family:var(--head);font-size:.72rem;color:var(--muted);flex:none}

.meal{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.meal:last-child{border:none}
.meal .mw{flex:0 0 90px;font-family:var(--head);font-weight:600;color:var(--g600);font-size:.78rem}
.meal .mt{flex:1;font-size:.9rem}
.meal .mk{flex:none;color:var(--muted);font-size:.75rem}

/* search / chips */
.searchbar{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.searchbar input{border:none;outline:none;flex:1;font-size:.95rem;background:none;color:var(--ink)}
.searchbar .ic{color:var(--muted)}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;font-family:var(--head);font-weight:600;font-size:.82rem;padding:8px 15px;border-radius:20px;background:var(--card);border:1px solid var(--line);color:var(--muted);display:flex;align-items:center;gap:6px}
.chip.active{background:var(--g700);color:#fff;border-color:var(--g700)}
.chip .ic{width:15px;height:15px}

.rec-item{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--g500);border-radius:14px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:10px}
.rec-item .rc-main{flex:1;min-width:0}
.rec-item h4{font-family:var(--head);font-weight:700;color:var(--ink);font-size:1rem;margin-bottom:5px}
.rec-item .rm{display:flex;gap:12px;font-size:.76rem;color:var(--muted);font-family:var(--head)}
.rec-item .rm b{color:var(--g600)}
.cat-tag{display:inline-block;font-family:var(--head);font-weight:600;font-size:.68rem;color:var(--g600);background:var(--g50);padding:2px 9px;border-radius:20px;margin-bottom:6px}
.fav-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);flex:none}
.fav-btn.on{color:#e0574c}
.fav-btn .ic{width:22px;height:22px}
.fav-btn.on .ic{fill:#e0574c;stroke:#e0574c}

/* sheet */
.sheet{position:fixed;inset:0;z-index:60;background:rgba(9,24,18,.55);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.22s;backdrop-filter:blur(2px)}
.sheet.open{opacity:1;pointer-events:auto}
.sheet-inner{background:var(--card);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;border-radius:24px 24px 0 0;padding:18px 18px calc(26px + var(--safe-b));transform:translateY(100%);transition:.3s cubic-bezier(.2,.8,.2,1)}
.sheet.open .sheet-inner{transform:none}
.sheet-grab{width:44px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 14px}
.sheet h3{font-family:var(--head);font-weight:800;color:var(--ink);font-size:1.3rem;margin-bottom:6px}
.sheet .rm{display:flex;gap:14px;font-size:.82rem;color:var(--muted);font-family:var(--head);margin-bottom:14px;flex-wrap:wrap}
.sheet .rm b{color:var(--g600)}
.sub-h{font-family:var(--head);font-weight:700;color:var(--g600);font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;margin:16px 0 7px}
.sheet ul,.sheet ol{padding-left:18px}
.sheet li{margin:5px 0;font-size:.92rem}
.sheet-close{position:sticky;top:0;float:right;color:var(--muted);width:34px;height:34px;border-radius:50%;background:var(--g50);display:flex;align-items:center;justify-content:center;margin:-2px -2px 0 0;border:1px solid var(--line)}

/* counters / progress */
.counter{display:flex;align-items:center;justify-content:space-between;gap:14px}
.counter .cbtn{width:54px;height:54px;border-radius:50%;background:var(--g50);color:var(--g700);font-size:1.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--line)}
.counter .cbtn:active{transform:scale(.92)}
.counter .cval{text-align:center}
.counter .cval b{font-family:var(--head);font-weight:800;font-size:2.1rem;color:var(--g600);display:block;line-height:1}
.counter .cval span{font-size:.78rem;color:var(--muted)}
.watergrid{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;justify-content:center}
.wcup{width:26px;height:32px;border:2px solid var(--g300);border-radius:4px 4px 8px 8px;transition:.15s}
.wcup.full{background:var(--g500);border-color:var(--g500)}
.hab{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.hab:last-child{border:none}
.hab .box{width:26px;height:26px;border-radius:8px;border:2px solid var(--g400);flex:none;display:flex;align-items:center;justify-content:center;color:#fff}
.hab.on .box{background:var(--g600);border-color:var(--g600)}
.hab span{font-size:.95rem}
.hab.on span{color:var(--muted);text-decoration:line-through}
.winput{display:flex;gap:8px;margin-top:10px}
.winput input{flex:1;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:1rem;outline:none;background:var(--card2);color:var(--ink)}
.winput button{background:var(--g600);color:#fff;font-family:var(--head);font-weight:700;padding:0 18px;border-radius:12px}
.chart{width:100%;height:150px;margin-top:8px}
.wlog{margin-top:10px}
.wlog-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:.9rem}
.wlog-row b{font-family:var(--head);color:var(--g600)}

/* timer */
.timer{text-align:center;padding:12px 0}
.timer .tt{font-family:var(--head);font-weight:800;font-size:3.6rem;color:var(--g600);line-height:1;letter-spacing:-1px}
.timer .ts{color:var(--muted);font-size:.88rem;margin-top:6px;min-height:20px}
.timer .tround{font-family:var(--head);font-weight:700;color:var(--gold);font-size:.8rem;margin-top:4px}
.timer-ctrls{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.timer-ctrls button{font-family:var(--head);font-weight:700;padding:11px 18px;border-radius:12px}
.timer-ctrls .go{background:var(--g600);color:#fff}
.timer-ctrls .rs{background:var(--g50);color:var(--g700);border:1px solid var(--line)}
.timer-ctrls .rs.active{background:var(--g600);color:#fff}
.ex-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.ex-row:last-child{border:none}
.ex-row.now{background:var(--g50);border-radius:10px;padding:12px 10px}
.ex-row .exn{flex:1}
.ex-row .exn b{font-family:var(--head);color:var(--ink);font-size:.95rem;font-weight:600}
.ex-row .exn span{display:block;color:var(--muted);font-size:.78rem}
.ex-row .exs{font-family:var(--head);font-weight:700;color:var(--g600);font-size:.85rem;text-align:right}

/* shopping */
.shopcat{font-family:var(--head);font-weight:700;color:#fff;background:linear-gradient(90deg,var(--g800),var(--g700));padding:10px 15px;border-radius:12px;margin:16px 0 8px;font-size:.95rem}
.shop-item{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line)}
.shop-item .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--g500);flex:none;display:flex;align-items:center;justify-content:center;color:#fff}
.shop-item.on .box{background:var(--g600);border-color:var(--g600)}
.shop-item.on span{color:var(--muted);text-decoration:line-through}

/* bônus / desafio */
.bcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow-sm)}
.bcard .bn{font-family:var(--head);font-weight:700;color:var(--ink);font-size:.95rem}
.bcard .bd{color:var(--muted);font-size:.82rem;margin-top:2px}
.bcard .bk{font-family:var(--head);font-size:.72rem;color:var(--g600);float:right}
.desafio-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow-sm)}
.desafio-item .dn{width:40px;height:40px;border-radius:12px;background:var(--g50);color:var(--g700);font-family:var(--head);font-weight:800;display:flex;align-items:center;justify-content:center;flex:none;font-size:.85rem;border:1px solid var(--line)}
.desafio-item.on .dn{background:var(--g600);color:#fff;border:none}
.desafio-item .di{flex:1}
.desafio-item .di b{font-size:.9rem;color:var(--ink)}
.desafio-item .di span{display:block;font-size:.78rem;color:var(--muted)}
.desafio-item .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--g500);flex:none;display:flex;align-items:center;justify-content:center;color:#fff}
.desafio-item.on .box{background:var(--g600);border-color:var(--g600)}

/* conquistas */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ach{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center;box-shadow:var(--shadow-sm);opacity:.55;filter:grayscale(.6)}
.ach.on{opacity:1;filter:none;border-color:var(--gold)}
.ach .medal{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;background:var(--g50);color:var(--muted);display:flex;align-items:center;justify-content:center}
.ach.on .medal{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#fff;box-shadow:0 8px 18px rgba(184,151,90,.4)}
.ach b{font-family:var(--head);font-size:.9rem;color:var(--ink);display:block}
.ach span{font-size:.74rem;color:var(--muted)}

/* article */
.article{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow-sm)}
.article .glead{font-size:1.02rem;color:var(--g600);font-weight:500;margin-bottom:10px}
.article h3{font-family:var(--head);color:var(--ink);font-size:1.15rem;margin:18px 0 6px}
.article h4{font-family:var(--head);color:var(--g600);font-size:1rem;margin:14px 0 4px}
.article p{margin:0 0 10px;font-size:.95rem;line-height:1.6}
.article ul,.article ol{padding-left:20px;margin:0 0 10px}
.article li{margin:4px 0;font-size:.94rem}
.article blockquote{border-left:4px solid var(--g500);background:var(--g50);padding:12px 14px;border-radius:0 10px 10px 0;margin:12px 0;font-family:var(--head);color:var(--ink)}
.article blockquote cite{display:block;margin-top:6px;font-size:.8rem;color:var(--muted);font-style:normal}
.article .gbox{background:var(--g50);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:12px 0;font-size:.92rem}
.article .gbox b{font-family:var(--head);color:var(--ink);display:block;margin-bottom:3px}
.article .gbox-warn{background:rgba(224,138,60,.1);border-color:rgba(224,138,60,.3)}.article .gbox-warn b{color:var(--warm)}
.article .gbox-tip{background:rgba(60,165,121,.1);border-color:rgba(60,165,121,.3)}.article .gbox-tip b{color:var(--g600)}
.article .gtblwrap{overflow-x:auto;margin:12px 0}
.article .gtbl{width:100%;border-collapse:collapse;font-size:.86rem;min-width:340px}
.article .gtbl th{background:var(--g700);color:#fff;text-align:left;padding:8px 10px;font-family:var(--head);font-weight:600}
.article .gtbl td{padding:7px 10px;border-bottom:1px solid var(--line)}
.article .gchk{list-style:none;padding-left:0}
.article .gchk li{padding-left:26px;position:relative}
.article .gchk li::before{content:"";position:absolute;left:0;top:3px;width:15px;height:15px;border:2px solid var(--g500);border-radius:4px}
.article .gstats{display:flex;gap:8px;margin:12px 0}
.article .gstats div{flex:1;background:var(--g50);border-radius:10px;padding:10px;text-align:center}
.article .gstats b{font-family:var(--head);font-size:1.3rem;color:var(--g600);display:block}
.article .gstats span{font-size:.72rem;color:var(--muted)}

/* config */
.cfg-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 0;border-bottom:1px solid var(--line)}
.cfg-row:last-child{border:none}
.cfg-row .ci{display:flex;align-items:center;gap:12px}
.cfg-row .ci .ic{color:var(--g600)}
.cfg-row .ci b{font-family:var(--head);font-weight:600;font-size:.95rem;color:var(--ink);display:block}
.cfg-row .ci span{font-size:.78rem;color:var(--muted)}
.switch{width:50px;height:29px;border-radius:20px;background:var(--line);position:relative;transition:.2s;flex:none}
.switch.on{background:var(--g500)}
.switch::after{content:"";position:absolute;width:23px;height:23px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.switch.on::after{left:24px}
.cfg-btn{width:100%;padding:14px;border-radius:13px;font-family:var(--head);font-weight:700;background:var(--g50);color:var(--g700);border:1px solid var(--line);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}

/* bottom nav — pill flutuante */
.tabbar{position:fixed;bottom:calc(12px + var(--safe-b));left:50%;transform:translateX(-50%);z-index:40;
  width:calc(100% - 26px);max-width:440px;background:var(--card);border:1px solid var(--line);border-radius:24px;
  display:flex;padding:7px;box-shadow:0 14px 34px rgba(15,61,46,.20),0 2px 6px rgba(15,61,46,.08)}
[data-theme="dark"] .tabbar{background:#102019;box-shadow:0 14px 40px rgba(0,0,0,.55)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-family:var(--head);
  font-weight:600;font-size:.62rem;padding:8px 0 6px;border-radius:18px;transition:.2s;position:relative}
.tab .ic{width:22px;height:22px;transition:.2s}
.tab.active{color:#fff;background:linear-gradient(135deg,var(--g600),var(--g500));box-shadow:0 8px 18px rgba(46,139,98,.4)}
.tab.active .ic{transform:translateY(-1px) scale(1.05)}
.tab:not(.active):active{background:var(--g50)}

/* modais */
.imodal,.onb{position:fixed;inset:0;z-index:80;background:rgba(9,24,18,.6);display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px)}
.imodal.open,.onb.open{display:flex}
.imodal .box,.onb .box{background:var(--card);border-radius:22px;padding:24px;max-width:410px;width:100%;box-shadow:var(--shadow-lg);animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.imodal h3,.onb h3{font-family:var(--head);font-weight:800;color:var(--ink);font-size:1.25rem;margin-bottom:6px}
.imodal p,.onb p{color:var(--muted);font-size:.9rem;margin-bottom:8px}
.imodal ol{padding-left:20px;margin:10px 0;font-size:.92rem}.imodal li{margin:6px 0}
.imodal .close,.onb .prim{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--g600),var(--g500));color:#fff;font-family:var(--head);font-weight:700;padding:14px;border-radius:13px}
.onb .skip{width:100%;margin-top:8px;color:var(--muted);font-size:.85rem;padding:8px}
.onb label{font-family:var(--head);font-weight:600;font-size:.85rem;color:var(--ink);display:block;margin:12px 0 5px}
.onb input{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:1.05rem;outline:none;background:var(--card2);color:var(--ink)}
.imodal .os-tabs{display:flex;gap:8px;margin-bottom:12px}
.imodal .os-tab{flex:1;text-align:center;font-family:var(--head);font-weight:600;font-size:.85rem;padding:8px;border-radius:10px;background:var(--g50);color:var(--muted)}
.imodal .os-tab.active{background:var(--g700);color:#fff}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%) translateY(20px);z-index:90;
  background:var(--g900);color:#fff;padding:13px 20px;border-radius:14px;font-family:var(--head);font-weight:600;font-size:.9rem;
  display:flex;align-items:center;gap:9px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.3s;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .ic{color:var(--gold2)}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:.9rem}
.backlink{display:inline-flex;align-items:center;gap:5px;font-family:var(--head);font-weight:600;font-size:.85rem;color:var(--g600);margin-bottom:12px;background:var(--card);border:1px solid var(--line);padding:8px 14px;border-radius:20px}

/* ===== v3 components ===== */
/* install/browser banner */
.ibanner{background:linear-gradient(135deg,var(--gold),#a9863f);color:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm)}
.ibanner .ic{flex:none}
.ibanner b{font-family:var(--head);font-weight:700;font-size:.92rem;display:block}
.ibanner span{font-size:.8rem;color:#fff5e6}
.ibanner .x{margin-left:auto;color:#fff5e6;padding:6px}
.ibanner button.act{background:#fff;color:#8a6a1e;font-family:var(--head);font-weight:700;font-size:.82rem;padding:8px 12px;border-radius:10px;white-space:nowrap}

/* frase do dia */
.frase{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:14px;padding:13px 16px;margin-bottom:14px;font-family:var(--head);font-style:italic;color:var(--ink);font-size:.92rem;box-shadow:var(--shadow-sm);display:flex;gap:10px;align-items:center}
.frase .ic{color:var(--gold);flex:none}

/* meta calórica banner */
.metabar{display:flex;gap:10px;margin-bottom:14px}
.metabar .m{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow-sm)}
.metabar .m b{font-family:var(--head);font-weight:800;font-size:1.2rem;color:var(--g600);display:block;line-height:1.1}
.metabar .m span{font-size:.68rem;color:var(--muted)}
.metabar .m.warn b{color:var(--warm)}

/* weekly summary */
.week{background:linear-gradient(135deg,var(--g700),var(--g600));color:#fff;border-radius:18px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.week b.wt{font-family:var(--head);font-weight:700;font-size:1.02rem;display:flex;align-items:center;gap:8px}
.week .wrow{display:flex;gap:10px;margin-top:12px}
.week .wrow .wi{flex:1;text-align:center;background:rgba(255,255,255,.1);border-radius:12px;padding:9px 4px}
.week .wrow .wi b{font-family:var(--head);font-weight:800;font-size:1.2rem;display:block}
.week .wrow .wi span{font-size:.66rem;color:#dff0e6}

/* heatmap */
.heat{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:6px}
.heat .hc{aspect-ratio:1;border-radius:6px;background:var(--g50);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--muted);font-family:var(--head)}
.heat .hc.l1{background:#bfe3ce;border-color:#a5d6b9;color:#2a6b4c}
.heat .hc.l2{background:var(--g500);border-color:var(--g500);color:#fff}
.heat .hc.l3{background:var(--g700);border-color:var(--g700);color:#fff}

/* projeção */
.proj{background:var(--g50);border:1px solid var(--g100);border-radius:12px;padding:13px 15px;margin-top:12px;font-size:.9rem;color:var(--ink)}
.proj b{font-family:var(--head);color:var(--g700)}

/* fotos */
.photos{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-top:6px;scrollbar-width:none}
.photos::-webkit-scrollbar{display:none}
.photo{flex:none;width:100px;height:130px;border-radius:12px;object-fit:cover;border:1px solid var(--line);position:relative}
.photo-wrap{flex:none;position:relative}
.photo-wrap .plabel{position:absolute;bottom:0;left:0;right:0;background:rgba(15,61,46,.75);color:#fff;font-size:.62rem;padding:3px;text-align:center;border-radius:0 0 12px 12px;font-family:var(--head)}
.photo-wrap .pdel{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.addphoto{flex:none;width:100px;height:130px;border-radius:12px;border:2px dashed var(--g300);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--g600);font-family:var(--head);font-size:.72rem;font-weight:600}
.compare{display:flex;gap:8px;margin-top:12px}
.compare .cc{flex:1;text-align:center}
.compare .cc img{width:100%;border-radius:12px;border:1px solid var(--line)}
.compare .cc span{font-size:.72rem;color:var(--muted);font-family:var(--head);display:block;margin-top:4px}

/* diário */
.diary-in{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:.95rem;background:var(--card2);color:var(--ink);outline:none;resize:vertical;min-height:70px;font-family:var(--body)}
.moods{display:flex;gap:8px;margin:8px 0}
.mood{flex:1;text-align:center;padding:10px 0;border-radius:12px;background:var(--g50);border:1px solid var(--line);font-size:1.3rem}
.mood.on{background:var(--g600);transform:scale(1.05)}

/* circuit settings */
.circ-cfg{display:flex;gap:8px;justify-content:center;margin-top:10px;align-items:center;flex-wrap:wrap;font-size:.8rem;color:var(--muted);font-family:var(--head)}
.circ-cfg input{width:52px;text-align:center;border:1px solid var(--line);border-radius:8px;padding:6px;background:var(--card2);color:var(--ink)}

/* exercise illustration */
.ex-fig{width:44px;height:50px;flex:none;color:var(--g700)}
.ex-fig svg{width:100%;height:100%}
[data-theme="dark"] .ex-fig{color:var(--g300)}

/* sort menu */
.sortbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.sortbar::-webkit-scrollbar{display:none}
.sortbar .lbl{font-size:.78rem;color:var(--muted);font-family:var(--head);flex:none}

/* reward */
.reward{background:linear-gradient(135deg,#e7c877,var(--gold));color:#4a3a12;border-radius:14px;padding:13px 15px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm)}
.reward .ic{flex:none}
.reward b{font-family:var(--head);font-weight:700;font-size:.92rem;display:block}
.reward span{font-size:.78rem}
.reward.lock{background:var(--g50);color:var(--muted);border:1px solid var(--line)}

canvas.sharecv{display:none}
</style>
</head>
